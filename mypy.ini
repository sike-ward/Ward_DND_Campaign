[mypy]
python_version = 3.11
strict = False
warn_unused_ignores = True
warn_return_any = False
ignore_missing_imports = True

# Pydantic models — let mypy plugin handle these
plugins = pydantic.mypy

# Per-module overrides for third-party libs without stubs
[mypy-PyQt6.*]
ignore_errors = True

[mypy-llama_index.*]
ignore_missing_imports = True

[mypy-openai.*]
ignore_missing_imports = True

[mypy-anthropic.*]
ignore_missing_imports = True

[mypy-bcrypt.*]
ignore_missing_imports = True

[mypy-tiktoken.*]
ignore_missing_imports = True

[mypy-yaml.*]
ignore_missing_imports = True
